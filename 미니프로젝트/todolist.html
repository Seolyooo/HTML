<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>TodoApp</title>
        <!-- 부트스트랩 스타일 링크 붙여넣기 -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
            crossorigin="anonymous">

        <script>

            document.addEventListener('DOMContentLoaded', function(){
                const todoList = document.getElementById('todoList');
                const inputTodo = document.getElementById('inputTodo');
                const btnAdd = document.getElementById('btnAdd');


                // 데이터 등록하기
                btnAdd.addEventListener('click', function(e){
                    const todoValue = inputTodo.value;

                    const listItem = document.createElement('li');
                    listItem.className = 'd-flex list-group-item';
                    listItem.innerText = todoValue;

                    const listBtn = document.createElement('button');
                    listBtn.className = 'btn-close ms-auto';

                    listItem.appendChild(listBtn);
                    todoList.appendChild(listItem);
                    
                    inputTodo.value = '';
                    
                    const todos = [];
                    todoList.querySelectorAll('li').forEach(li => {
                        todos.push(li.firstChild.textContent.trim());
                    });
                    localStorage.setItem('todos', JSON.stringify(todos));
                    
                });

                
                // 데이터 삭제 기능 구현하기
                todoList.addEventListener('click', function(e){
                    if(e.target.classList.contains('btn-close')) {
                        const listItemToRemove = e.target.parentElement;
                        listItemToRemove.remove();
                    }

                    const todos = [];
                    todoList.querySelectorAll('li').forEach(li => {
                        todos.push(li.firstChild.textContent.trim());
                    });
                    localStorage.setItem('todos', JSON.stringify(todos));
                });


                // 데이터 유지 기능 구현하기
                const savedTodos = localStorage.getItem('todos');

                if (savedTodos) {
                    const todosArray = JSON.parse(savedTodos);
                    todosArray.forEach(todoText => {
                        const listItem = document.createElement('li');
                        listItem.className = 'd-flex list-group-item';
                        listItem.innerText = todoText;

                        const listBtn = document.createElement('button');
                        listBtn.className = 'btn-close ms-auto';

                        listItem.appendChild(listBtn);
                        todoList.appendChild(listItem);
                    });
                }


            });
        </script>
    </head>
    <body>
        <div class="container">
            <h3 class="p-3 mt-5 bg-primary text-light">ToDo List</h3>
            <p class="p-3">오늘 할일을 작성해 보세요.</p>
            <div class="input-group mb-3">
                <input type="text" id="inputTodo" class="form-control" placeholder="할일을 입력하세요.">
                <button class="btn btn-primary text-light" type="button" id="btnAdd">추가</button>
            </div>
            <ol id="todoList" class="list-group list-group-numbered"></ol>
        </div>
    </body>
</html>
